<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>මුරපදය යළි පිහිටුවීම (Reset Password)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Noto Sans Sinhala', sans-serif; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#fff1f2', 100: '#ffe4e6', 200: '#fecdd3', 300: '#fda4af',
                            400: '#fb7185', 500: '#f43f5e', 600: '#e11d48', 700: '#be123c',
                            800: '#9f1239', 900: '#881337',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div id="reset-container" class="bg-white rounded-3xl shadow-2xl overflow-hidden max-w-md w-full p-8 sm:p-12">
        <div class="text-center mb-10">
             <img src="Logo.png" alt="Logo" class="h-20 mx-auto mb-4 object-contain">
             <h1 class="text-2xl font-bold text-gray-800">මුරපදය යළි පිහිටුවීම</h1>
             <p class="text-gray-500 text-sm mt-2">පද්ධති පරිපාලක විසින් ලබාදුන් නව මුරපදය මෙහි ඇතුලත් කරන්න</p>
        </div>

        <form id="reset-password-form" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">පරිශීලක නාමය (Username)</label>
                <input type="text" id="username" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition" placeholder="admin" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">නව මුරපදය (New Password)</label>
                <input type="password" id="new-password" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition" placeholder="••••••••" required minlength="6">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">තහවුරු කිරීම (Confirm Password)</label>
                <input type="password" id="confirm-password" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition" placeholder="••••••••" required minlength="6">
            </div>
            <div id="error-msg" class="hidden text-red-500 text-sm font-medium text-center bg-red-50 p-3 rounded-lg"></div>
            <div id="success-msg" class="hidden text-green-600 text-sm font-medium text-center bg-green-50 p-3 rounded-lg">
                මුරපදය සාර්ථකව වෙනස් කරන ලදී! දැන් ඔබට නව මුරපදයෙන් ඇතුළු විය හැක.
            </div>
            <button type="submit" id="submit-btn" class="w-full py-4 px-6 text-white font-bold bg-red-600 rounded-xl hover:bg-primary-700 shadow-md transition transform hover:-translate-y-1">
                මුරපදය තහවුරු කරන්න
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="admin-login.html" class="text-sm font-medium text-gray-500 hover:text-red-600 transition">← ආපසු පිවිසුම් පිටුවට</a>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script>
        document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p1 = document.getElementById('new-password').value;
            const p2 = document.getElementById('confirm-password').value;
            const errorMsg = document.getElementById('error-msg');
            const successMsg = document.getElementById('success-msg');
            const btn = document.getElementById('submit-btn');

            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            if (p1 !== p2) {
                errorMsg.innerText = "මුරපද එකිනෙකට නොගැලපේ.";
                errorMsg.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'යාවත්කාලීන වෙමින්...';

            try {
                // We use a public reset without session for this specific requested flow
                const db = await initDB();
                const { error } = await db.from('app_users').update({ password: p1 }).eq('username', u);
                
                if (!error) {
                    successMsg.classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = 'admin-login.html';
                    }, 3000);
                } else {
                    throw error;
                }
            } catch (err) {
                console.error(err);
                errorMsg.innerText = "දෝෂයක් ඇති විය. කරුණාකර නැවත උත්සාහ කරන්න.";
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = 'මුරපදය තහවුරු කරන්න';
            }
        });
    </script>
</body>
</html>
