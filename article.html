<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">පුවත කියවීම - තැපැල් පුවත්</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Noto Sans Sinhala"', 'sans-serif'] },
                    colors: {
                        primary: {
                            50: '#fef2f2', 100: '#fee2e2', 500: '#ef4444', 600: '#dc2828', 700: '#b91c1c', 900: '#7f1d1d',
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        body { font-family: 'Noto Sans Sinhala', sans-serif; background-color: #f8fafc; }
        .article-content p { @apply text-gray-700 leading-relaxed mb-6 text-xl font-medium; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .round-box { @apply bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-gray-100; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <div id="navbar-placeholder"></div>
    <main class="flex-grow container mx-auto px-4 py-8 md:py-16 fade-in">
        <div id="article-container" class="max-w-4xl mx-auto">
            <!-- Loading Indicator -->
            <div class="animate-pulse space-y-10">
                <div class="h-10 bg-gray-200 rounded-full w-3/4 mx-auto"></div>
                <div class="h-64 md:h-[500px] bg-gray-200 rounded-[2.5rem] w-full"></div>
            </div>
        </div>
    </main>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/lang.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('article-container');
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id || !container) {
                container.innerHTML = '<div class="round-box p-16 text-center text-red-500 font-bold"><p class="text-2xl mb-4">පුවත හඳුනාගත නොහැකි විය.</p><a href="index.html" class="text-primary-600 hover:underline">මුල් පිටුව වෙත</a></div>';
                return;
            }

            try {
                const post = await getPostById(id);
                if (!post) {
                    container.innerHTML = '<div class="round-box p-16 text-center text-red-500 font-bold"><p class="text-2xl mb-4">මෙම පුවත තවදුරටත් නොමැත.</p><a href="index.html" class="text-primary-600 hover:underline">මුල් පිටුව වෙත</a></div>';
                    return;
                }

                document.title = `${post.title} - තැපැල් පුවත්`;
                const label = (typeof typeLabels !== 'undefined') ? (typeLabels[post.type] || 'පුවත්') : 'පුවත්';

                container.innerHTML = `
                    <article class="round-box fade-in">
                        ${post.image ? `
                            <div class="h-[250px] md:h-[500px] overflow-hidden border-b border-gray-100">
                                <img src="${post.image}" alt="${getP(post, 'title')}" class="w-full h-full object-cover">
                            </div>
                        ` : ''}
                        
                        <div class="p-8 md:p-16">
                            <header class="mb-10 pb-10 border-b border-gray-50">
                                <div class="flex items-center text-sm font-bold text-gray-400 space-x-3 mb-6">
                                    <span class="bg-red-50 text-primary-600 px-4 py-1 rounded-full border border-red-100 uppercase tracking-widest">${t(post.type)}</span>
                                    <span>${new Date(post.date).toLocaleDateString(getCurrentLang() === 'si' ? 'si-LK' : 'en-US')}</span>
                                    <span>•</span>
                                    <span class="italic">${post.author || t('admin')}</span>
                                </div>
                                <h1 class="text-3xl md:text-5xl font-extrabold text-gray-900 leading-tight">
                                    ${getP(post, 'title')}
                                </h1>
                            </header>

                            <div class="article-content text-gray-800">
                                ${getP(post, 'content').split('\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('')}
                            </div>

                            <footer class="mt-16 pt-10 border-t border-gray-50 flex justify-between items-center">
                                <button onclick="window.history.back()" class="text-gray-400 hover:text-primary-600 font-bold transition flex items-center text-sm uppercase tracking-widest">
                                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                                    ${t('back')}
                                </button>
                                <div class="text-xs font-black text-gray-300 uppercase tracking-widest italic">Sri Lanka POST News</div>
                            </footer>
                        </div>
                    </article>
                `;
            } catch (err) {
                console.error("Article error:", err);
                container.innerHTML = '<div class="round-box p-16 text-center text-red-500 font-bold">දත්ත ලබාගැනීමේදී දෝෂයක් ඇති විය.</div>';
            }
        });
    </script>
    <script src="js/navbar.js"></script>
</body>
</html>
