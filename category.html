<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">ප්‍රවර්ගය - තැපැල් පුවත්</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Noto Sans Sinhala"', 'sans-serif'] },
                    colors: {
                        primary: {
                            50: '#fef2f2', 100: '#fee2e2', 500: '#ef4444', 600: '#dc2828', 700: '#b91c1c', 900: '#7f1d1d',
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        body { font-family: 'Noto Sans Sinhala', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <div id="navbar-placeholder"></div>
    <main class="flex-grow container mx-auto px-4 py-8 md:py-16 fade-in">
        <header class="mb-16 text-center">
            <h1 id="category-title" class="text-4xl md:text-7xl font-extrabold text-gray-950 mb-6 leading-tight">ප්‍රවර්ගය</h1>
            <div class="h-2 w-32 bg-primary-600 mx-auto rounded-full shadow-lg"></div>
        </header>

        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            <!-- Loading Indicator -->
            <div class="col-span-full py-32 text-center fade-in">
                <div class="inline-block w-16 h-16 border-4 border-primary-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-6 text-gray-400 font-extrabold text-xl animate-pulse">පූරණය වෙමින් පවතී...</p>
            </div>
        </div>
    </main>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/lang.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const type = urlParams.get('type') || 'news';
            
            document.getElementById('category-title').innerText = typeLabels[type] || 'ප්‍රවර්ගය';
            document.title = `${typeLabels[type] || 'ප්‍රවර්ගය'} - තැපැල් පුවත්`;

            const grid = document.getElementById('news-grid');
            if (!grid) return;

            try {
                const posts = await getAllPosts(type);
                if (!posts || posts.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full py-40 text-center fade-in bg-white border border-gray-100 rounded-[3rem] shadow-sm italic">
                            <p class="text-gray-400 text-3xl font-extrabold mb-8">දැනට මෙම ප්‍රවර්ගය යටතේ පුවත් කිසිවක් හමු නොවීය.</p>
                            <a href="index.html" class="px-10 py-4 bg-primary-600 text-white font-extrabold rounded-[1.5rem] hover:bg-primary-700 transition shadow-2xl hover:shadow-primary-100">මුල් පිටුවට ආපසු</a>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = posts.map(post => `
                    <div class="glass rounded-[2.5rem] overflow-hidden shadow-xl hover:shadow-2xl transition-all duration-500 transform hover:-translate-y-4 group cursor-pointer border border-white flex flex-col h-full bg-white" onclick="window.location.href='article.html?id=${post.id}'">
                        <div class="h-64 overflow-hidden relative">
                            <img src="${post.image || 'https://via.placeholder.com/600x400'}" alt="${getP(post, 'title')}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                            <div class="absolute inset-0 bg-gradient-to-t from-gray-950/60 via-transparent to-transparent opacity-80 group-hover:opacity-0 transition-opacity duration-300"></div>
                        </div>
                        <div class="p-10 flex flex-col flex-grow">
                            <div class="flex items-center space-x-3 mb-6">
                                <span class="bg-red-50 text-primary-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-wider border border-red-100">${t(post.type)}</span>
                                <span class="text-gray-400 text-xs font-bold leading-none">${new Date(post.date).toLocaleDateString(getCurrentLang() === 'si' ? 'si-LK' : 'en-US')}</span>
                            </div>
                            <h3 class="text-2xl md:text-3xl font-black mb-6 text-gray-800 line-clamp-2 group-hover:text-primary-600 transition-colors leading-tight italic font-serif">
                                ${getP(post, 'title')}
                            </h3>
                            <p class="text-gray-500 text-lg line-clamp-3 mb-10 leading-loose flex-grow">${getP(post, 'content')}</p>
                            <div class="mt-auto pt-8 border-t-2 border-gray-50 flex items-center justify-between">
                                <div class="flex items-center">
                                    <span class="text-sm font-black text-gray-500 italic uppercase underline decoration-red-600 underline-offset-8">${post.author || t('admin')}</span>
                                </div>
                                <span class="text-primary-600 font-black text-sm group-hover:translate-x-3 transition-transform uppercase tracking-tighter">${t('read_more')}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Category load error:", err);
                grid.innerHTML = `
                    <div class="col-span-full py-40 text-center text-red-500 fade-in bg-white border border-red-50 rounded-[3rem] italic transition-all">
                        <p class="text-3xl font-extrabold mb-6 italic">දත්ත ලබාගැනීමේදී දෝෂයක් ඇති විය.</p>
                        <p class="text-gray-400 mb-10 font-bold">${err.message || ''}</p>
                        <a href="index.html" class="px-8 py-3 bg-primary-600 text-white rounded-xl shadow-lg font-black uppercase tracking-widest">යලි පූරණය කරන්න</a>
                    </div>
                `;
            }
        });
    </script>
    <script src="js/navbar.js"></script>
</body>
</html>
