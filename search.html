<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සෙවුම් ප්‍රතිඵල (Search Results) - තැපැල් පුවත්</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#fef2f2', 100: '#fee2e2', 500: '#ef4444', 600: '#dc2828', 700: '#b91c1c', 900: '#7f1d1d',
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities { 
            .glass { @apply bg-white bg-opacity-80 backdrop-blur-md border border-gray-100 shadow-lg; } 
        }
        body { font-family: 'Noto Sans Sinhala', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">
    <div id="navbar-placeholder"></div>
    <main class="flex-grow container mx-auto px-4 py-12 max-w-5xl fade-in">
        <div class="mb-12">
            <h1 class="text-4xl font-extrabold mb-4 text-gray-900 leading-tight" data-lang="search_results">${t('search_results')}</h1>
            <p id="search-query-display" class="text-gray-500 text-lg font-medium"></p>
            <div class="h-1.5 w-24 bg-primary-600 mt-6 rounded-full"></div>
        </div>

        <div id="search-results-list" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Loading skeleton -->
            <div class="animate-pulse bg-gray-200 h-64 rounded-3xl"></div>
            <div class="animate-pulse bg-gray-200 h-64 rounded-3xl"></div>
        </div>
    </main>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/lang.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const list = document.getElementById('search-results-list');
            const queryDisplay = document.getElementById('search-query-display');
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q');

            if (!query) {
                window.location.href = 'index.html';
                return;
            }

            queryDisplay.innerText = `"${query}"`;

            try {
                const results = await searchPosts(query);
                if (results.length === 0) {
                    list.classList.remove('grid');
                    list.innerHTML = `
                        <div class="p-16 text-center bg-white rounded-3xl shadow-sm border border-gray-100 fade-in w-full">
                            <div class="text-6xl mb-6">🔍</div>
                            <p class="text-gray-400 text-2xl font-bold" data-lang="search_empty">${t('search_empty')}</p>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = results.map(post => `
                    <div class="glass rounded-3xl overflow-hidden hover:shadow-2xl transition-all duration-300 group cursor-pointer flex flex-col h-full" onclick="window.location.href='article.html?id=${post.id}'">
                        ${post.image ? `
                            <div class="h-48 overflow-hidden shrink-0">
                                <img src="${post.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            </div>
                        ` : ''}
                        <div class="p-6 flex flex-col flex-grow">
                            <div class="flex items-center text-[10px] font-black text-primary-600 mb-3 uppercase tracking-widest bg-primary-50 px-3 py-1 rounded-full w-fit">
                                ${t(post.type)}
                            </div>
                            <h2 class="text-xl font-extrabold mb-3 text-gray-800 group-hover:text-primary-600 transition-colors leading-tight line-clamp-2">
                                ${getP(post, 'title')}
                            </h2>
                            <p class="text-gray-500 text-sm line-clamp-3 leading-relaxed mb-6">${getP(post, 'content')}</p>
                            <div class="mt-auto pt-4 border-t border-gray-50 flex justify-between items-center">
                                <span class="text-[10px] font-bold text-gray-400 uppercase">${new Date(post.date).toLocaleDateString()}</span>
                                <span class="text-primary-600 font-bold text-xs uppercase tracking-widest">${t('read_more')}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
                list.innerHTML = `<p class="text-red-500 font-bold">${t('error_loading')}</p>`;
            }
        });
    </script>
    <script src="js/navbar.js"></script>
</body>
</html>
